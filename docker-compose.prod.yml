services:
  shehong-server:
    build:
      context: ./server
    container_name: shehong-server
    restart: unless-stopped
    env_file:
      - ./server/.env.prod
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - LOG_DIR=/app/logs
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/logs:/app/logs
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - shehong-net
      - fastgpt-net

networks:
  shehong-net:
    driver: bridge
  fastgpt-net:
    external: true
    name: fastgpt_fastgpt
