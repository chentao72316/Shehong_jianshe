<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>射洪建设支撑 - 文件上传</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { background: #fff; border-radius: 16px; padding: 40px; width: 520px; max-width: 95vw; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .logo { font-size: 48px; text-align: center; margin-bottom: 8px; }
  .title { text-align: center; font-size: 22px; font-weight: bold; color: #1E6F3F; margin-bottom: 4px; }
  .subtitle { text-align: center; color: #8C8C8C; font-size: 14px; margin-bottom: 32px; }

  .form-group { margin-bottom: 20px; }
  .label { display: block; font-size: 14px; color: #595959; margin-bottom: 8px; }
  .label span { color: #F5222D; }

  input[type="text"] { width: 100%; height: 44px; border: 1px solid #E8E8E8; border-radius: 8px; padding: 0 14px; font-size: 15px; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: #1E6F3F; }

  select { width: 100%; height: 44px; border: 1px solid #E8E8E8; border-radius: 8px; padding: 0 14px; font-size: 15px; outline: none; cursor: pointer; }
  select:focus { border-color: #1E6F3F; }

  .drop-zone { border: 2px dashed #D9D9D9; border-radius: 12px; padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #1E6F3F; background: #f6fff8; }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-icon { font-size: 40px; margin-bottom: 12px; }
  .drop-text { font-size: 15px; color: #595959; }
  .drop-hint { font-size: 12px; color: #BFBFBF; margin-top: 6px; }

  .file-info { display: flex; align-items: center; gap: 12px; padding: 14px; background: #F5F5F5; border-radius: 8px; margin-top: 12px; }
  .file-name { flex: 1; font-size: 14px; color: #262626; word-break: break-all; }
  .file-size { font-size: 12px; color: #8C8C8C; white-space: nowrap; }
  .file-remove { color: #F5222D; cursor: pointer; font-size: 18px; }

  .btn { width: 100%; height: 48px; border: none; border-radius: 24px; font-size: 16px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #1E6F3F; color: #fff; }
  .btn-primary:not(:disabled):hover { opacity: 0.85; }

  .tip { margin-top: 16px; padding: 12px 16px; background: #F6FFED; border: 1px solid #B7EB8F; border-radius: 8px; font-size: 13px; color: #52C41A; }
  .tip-red { background: #FFF2F0; border-color: #FFCCC7; color: #F5222D; }

  #result { margin-top: 20px; }
  .result-url { background: #F5F5F5; padding: 12px 16px; border-radius: 8px; font-size: 13px; color: #262626; word-break: break-all; margin-top: 8px; }
  .result-url a { color: #1E6F3F; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="logo">📁</div>
  <div class="title">射洪建设支撑</div>
  <div class="subtitle">PC 文件上传工具</div>

  <!-- Token 认证 -->
  <div class="form-group">
    <label class="label">Token <span>*</span></label>
    <input type="text" id="token" placeholder="从调试接口获取，或联系管理员" />
    <div class="tip tip-red" style="margin-top:6px">
      Token 获取方式（浏览器直接打开）：<br>
      <code id="tokenUrl"></code>
    </div>
  </div>

  <!-- 文件类型 -->
  <div class="form-group">
    <label class="label">文件类型 <span>*</span></label>
    <select id="fileType">
      <option value="image">图片（jpg/png/webp）</option>
      <option value="file">图片或文档（jpg/png/pdf/word/excel/cad）</option>
    </select>
  </div>

  <!-- 文件选择 -->
  <div class="form-group">
    <label class="label">选择文件 <span>*</span></label>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" />
      <div class="drop-icon">📤</div>
      <div class="drop-text">点击选择文件 或 拖拽文件到此处</div>
      <div class="drop-hint" id="dropHint">支持 jpg/png/pdf/doc/xlsx/dwg，单文件 ≤20MB</div>
    </div>
    <div class="file-info" id="fileInfo" style="display:none">
      <span class="file-name" id="fileName"></span>
      <span class="file-size" id="fileSize"></span>
      <span class="file-remove" id="fileRemove">×</span>
    </div>
  </div>

  <button class="btn btn-primary" id="uploadBtn" disabled onclick="doUpload()">上传</button>

  <!-- 结果 -->
  <div id="result" style="display:none">
    <div class="tip" id="successMsg" style="display:none"></div>
    <div class="tip tip-red" id="errorMsg" style="display:none"></div>
    <div id="urlArea" style="display:none">
      <div class="label" style="margin-top:12px">文件地址（可直接复制）</div>
      <div class="result-url" id="resultUrl"></div>
    </div>
  </div>
</div>

<script>
  const API_BASE = location.origin;
  document.getElementById('tokenUrl').textContent = API_BASE + '/api/debug/login?phone=13882508425';

  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const fileSize = document.getElementById('fileSize');
  const fileRemove = document.getElementById('fileRemove');
  const dropZone = document.getElementById('dropZone');
  const dropHint = document.getElementById('dropHint');
  const uploadBtn = document.getElementById('uploadBtn');
  const fileType = document.getElementById('fileType');
  const result = document.getElementById('result');

  let selectedFile = null;

  // 扩展名限制提示
  fileType.addEventListener('change', () => {
    dropHint.textContent = fileType.value === 'image'
      ? '支持 jpg/png，单文件 ≤20MB'
      : '支持 pdf/doc/docx/xls/xlsx/dwg，单文件 ≤20MB';
  });

  function setFile(f) {
    const maxSize = 20 * 1024 * 1024;
    if (f.size > maxSize) {
      alert('文件大小不能超过 20MB'); return;
    }
    selectedFile = f;
    fileName.textContent = f.name;
    fileSize.textContent = (f.size / 1024 / 1024).toFixed(2) + ' MB';
    fileInfo.style.display = 'flex';
    uploadBtn.disabled = false;
    result.style.display = 'none';
  }

  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
  fileRemove.addEventListener('click', () => {
    selectedFile = null; fileInput.value = ''; fileInfo.style.display = 'none';
    uploadBtn.disabled = true; result.style.display = 'none';
  });

  // 拖拽
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  async function doUpload() {
    const token = document.getElementById('token').value.trim();
    if (!token) { alert('请先输入 Token'); return; }
    if (!selectedFile) { alert('请选择文件'); return; }

    uploadBtn.disabled = true;
    uploadBtn.innerHTML = '<span class="spinner"></span>上传中...';

    const ft = fileType.value;
    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch(`${API_BASE}/api/upload/${ft}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();

      if (data.code === 0) {
        const url = API_BASE + data.data.url;
        document.getElementById('successMsg').style.display = 'block';
        document.getElementById('successMsg').textContent = '上传成功！';
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('urlArea').style.display = 'block';
        document.getElementById('resultUrl').textContent = url;
        document.getElementById('resultUrl').innerHTML = `<a href="${url}" target="_blank">${url}</a>`;
        result.style.display = 'block';
        selectedFile = null; fileInput.value = ''; fileInfo.style.display = 'none';
      } else {
        throw new Error(data.message || '上传失败');
      }
    } catch (err) {
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorMsg').textContent = '上传失败：' + err.message;
      document.getElementById('successMsg').style.display = 'none';
      document.getElementById('urlArea').style.display = 'none';
      result.style.display = 'block';
    } finally {
      uploadBtn.disabled = false;
      uploadBtn.textContent = '上传';
    }
  }
</script>
</body>
</html>
